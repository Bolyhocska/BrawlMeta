name: Refresh — Brawler Intelligence

# Safety-net refresh of the brawler_intelligence table (the match scrapers
# already refresh it after every successful push — this catches config-only
# changes and any missed run). Cheap: one class sync + one RPC call.
on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Refresh brawler intelligence
        env:
          SUPERCELL_API_KEY: ${{ secrets.SUPERCELL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m scrapers.meta_weights
