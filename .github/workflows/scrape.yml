name: BrawlMeta Auto-Scraper

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: 

jobs:
  harvest-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Get fresh Supercell API key
        id: get_key
        run: |
          RESPONSE=$(curl -s -X POST https://get-sc-key.vercel.app \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.SUPERCELL_EMAIL }}","password":"${{ secrets.SUPERCELL_PASSWORD }}","game":"brawlstars"}')
          KEY=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["key"])')
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Run Scraper
        env:
          SUPERCELL_API_KEY: ${{ steps.get_key.outputs.key }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python scraper.py
