name: BrawlMeta Auto-Scraper

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: 

jobs:
  harvest-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Debug secrets
        run: |
          echo "SUPERCELL_API_KEY set: ${{ secrets.SUPERCELL_API_KEY != '' }}"
          echo "SUPABASE_URL set: ${{ secrets.SUPABASE_URL != '' }}"
          echo "SUPABASE_KEY set: ${{ secrets.SUPABASE_KEY != '' }}"
          echo "PROXY_HOST set: ${{ secrets.PROXY_HOST != '' }}"
          echo "PROXY_PORT set: ${{ secrets.PROXY_PORT != '' }}"
          echo "PROXY_USER set: ${{ secrets.PROXY_USER != '' }}"
          echo "PROXY_PASS set: ${{ secrets.PROXY_PASS != '' }}"

      - name: Run Scraper
        env:
          SUPERCELL_API_KEY: ${{ secrets.SUPERCELL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python scraper.py
