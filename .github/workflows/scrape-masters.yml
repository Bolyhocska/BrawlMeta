name: Scrape — Masters Matches

# Masters+ ranked-match spider (brawlytix-seeded, depth 2). Every 6 hours.
#
# Frequency, not breadth, is the lever here: one run saturates the 2-hop graph
# from its seeds at roughly 33k players / 30k unique matches and then reports
# "ran out of players" — widening the seed set barely helps, because the top-200
# global players all queue against each other and their neighbourhoods overlap.
# What DOES produce new rows is elapsed time, since the same players keep
# playing. So we re-walk the graph 4x a day while filling the 1.5M baseline.
#
# Scheduled one hour after each scrape-leaderboard run (05/11/17/23) so the two
# scrapers never share the proxy, and early enough at 06:00 to finish before
# scrape-diamond-mythic (07:30) and refresh-intelligence (08:30).
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  masters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Run Masters scraper
        env:
          SUPERCELL_API_KEY: ${{ secrets.SUPERCELL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python -m scrapers.masters
