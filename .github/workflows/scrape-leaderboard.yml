name: Scrape — Leaderboard & Site Feed

# Cheap relay (2 API calls): top-200 trophy leaderboard + event rotation.
# Runs every 6 hours so the Leaderboards tab stays fresh, independent of the
# long-running match spiders.
on:
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run leaderboard scraper
        env:
          SUPERCELL_API_KEY: ${{ secrets.SUPERCELL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python -m scrapers.leaderboard
